# Example caller for ruflo-hivemind.yml (same repository).
#
# Prerequisites:
#   - Repository secret ANTHROPIC_API_KEY
#   - Branch is pushable by GITHUB_TOKEN (not blocked by protection without bypass)
#
# Other repos can call:
#   uses: <owner>/github-workflow-examples/.github/workflows/ruflo-hivemind.yml@<ref>
#   secrets:
#     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#   with:
#     instruction: "..."
#     model: "claude-sonnet-4-20250514"

name: RuFlo Hive Mind (example caller)

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: Task for the RuFlo agent team
        required: true
        type: string
        default: "Review this repository and suggest one small documentation improvement."
      model:
        description: Anthropic model slug for primary (Opus/Sonnet) tiers
        required: false
        type: string
        default: "claude-sonnet-4-6"
      fast_model:
        description: Anthropic model slug for secondary (Haiku/subagent) tiers
        required: false
        type: string
        default: "claude-haiku-4-5"

jobs:
  ruflo:
    permissions:
      contents: write
    uses: ./.github/workflows/ruflo-hivemind.yml
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      instruction: ${{ inputs.instruction }}
      model: ${{ inputs.model }}
      fast_model: ${{ inputs.fast_model }}
