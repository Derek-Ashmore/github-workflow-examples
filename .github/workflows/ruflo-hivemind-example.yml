# Example caller for ruflo-hivemind.yml (same repository).
#
# Prerequisites:
#   - Repository secret ANTHROPIC_API_KEY
#   - Branch is pushable by GITHUB_TOKEN (not blocked by protection without bypass)
#
# Other repos can call:
#   uses: <owner>/github-workflow-examples/.github/workflows/ruflo-hivemind.yml@<ref>
#   secrets:
#     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#   with:
#     instruction: "..."

name: RuFlo Hive Mind (example caller)

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: Task for the RuFlo agent team
        required: true
        type: string
        default: "Review this repository and suggest one small documentation improvement."

jobs:
  ruflo:
    uses: ./.github/workflows/ruflo-hivemind.yml
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      instruction: ${{ inputs.instruction }}
